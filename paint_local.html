<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UrSekai Xray</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <!-- Modular architecture: config, state, dataParser, canvas, filters, ui -->
    <!-- config.js is now imported as an ES6 module from ui.js -->
    <script type="module" src="js/ui.js"></script>
</head>

<body>
    <!-- Drop Zone Modal -->
    <div class="drop-zone-backdrop hidden" id="dropZoneBackdrop">
        <div class="drop-zone" id="dropZone">
            <button class="drop-zone-close" onclick="window.closeDropZoneModal?.()">✕</button>
            <div class="drop-zone-content">
                <div class="drop-icon">📁</div>
                <h2>Load Data File</h2>
                <div class="drop-hint">Drag & drop your JSON file here</div>
                <div class="or-text">or</div>
                <button class="file-input-button" onclick="document.getElementById('hiddenFileInput').click()">
                    Browse Files
                </button>
            </div>
        </div>
    </div>
    <input type="file" id="hiddenFileInput" />

    <button class="menu-toggle" onclick="window.toggleSidebar?.()">☰</button>
    <div class="sidebar-overlay" onclick="window.closeSidebar?.()" id="sidebarOverlay"></div>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2>Controls</h2>
            <div class="sidebar-header-buttons">
                <button class="sidebar-clear-data" onclick="window.clearLoadedData?.()" title="Clear loaded data">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="3 6 5 6 21 6"></polyline>
                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                        <line x1="10" y1="11" x2="10" y2="17"></line>
                        <line x1="14" y1="11" x2="14" y2="17"></line>
                    </svg>
                </button>
                <button class="sidebar-close" onclick="closeSidebar()" title="Close sidebar">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="20" y1="4" x2="4" y2="20"></line>
                        <line x1="4" y1="4" x2="20" y2="20"></line>
                    </svg>
                </button>
            </div>
        </div>
        <div class="sidebar-content" id="sidebarContent">
        </div>
    </div>

    <div class="container">
        <div class="image-container">
            <img alt="Scene background" id="image" draggable="false">
            <canvas class="grid-canvas" id="gridCanvas"></canvas>
        </div>
    </div>

    <div class="item-summary" id="itemSummary"></div>

    <div class="controls">
        <div class="scene-buttons">
            <button onclick="window.selectScene?.('scene1')" data-scene="scene1">さいしょの原っぱ</button>
            <button onclick="window.selectScene?.('scene2')" data-scene="scene2">彩りの花畑</button>
            <button onclick="window.selectScene?.('scene3')" data-scene="scene3">願いの砂浜</button>
            <button onclick="window.selectScene?.('scene4')" data-scene="scene4">忘れ去られた場所</button>
        </div>
        <select id="bgOverlaySelect" onchange="window.setBgOverlay?.(this.value)">
            <option value="off">BG: off</option>
            <option value="black-25">25% black</option>
            <option value="black-50">50% black</option>
            <option value="black-75">75% black</option>
            <option value="black-100">100% black</option>
            <option value="white-25">25% white</option>
            <option value="white-50">50% white</option>
            <option value="white-75">75% white</option>
            <option value="white-100">100% white</option>
        </select>
        <button class="filter-button" onclick="window.openDropZoneModal?.()">📤 Load Data File</button>
        <button class="filter-button" onclick="window.toggleFilterPanel?.()">🔍 Filter Items</button>
        <div class="filter-panel" id="filterPanel">
            <div class="filter-options">
                <div class="filter-option">
                    <input type="radio" id="filterAll" name="filterMode" value="all" checked
                        onchange="window.changeFilterMode?.()">
                    <label for="filterAll">Show All Items</label>
                </div>
                <div class="filter-option">
                    <input type="radio" id="filterRare" name="filterMode" value="rare"
                        onchange="window.changeFilterMode?.()">
                    <label for="filterRare">Show Rare Items Only</label>
                </div>
                <div class="filter-option">
                    <input type="radio" id="filterCustom" name="filterMode" value="custom"
                        onchange="window.changeFilterMode?.()">
                    <label for="filterCustom">Show Custom Selected Items</label>
                </div>
            </div>
            <div id="itemCheckboxContainer" class="item-checkbox-list"></div>
        </div>
        <div class="display-mode-toggle">
            <label>Display Mode:</label>
            <div class="toggle-buttons">
                <button class="mode-button active" id="modeAllBtn" onclick="window.setDisplayMode?.('all')">
                    All Cards
                </button>
                <button class="mode-button" id="modeAggregatedBtn" onclick="window.setDisplayMode?.('aggregated')">
                    Aggregated <span class="beta-badge">β</span>
                </button>
            </div>
        </div>
        <a class="external-link" href="https://endoretic.github.io/pjsk-gatecalculator/" target="_blank"
            rel="noopener">ゲート素材計算機 | Material Planner</a>

        <div class="log-container">
            <div class="log-scroll" id="logContainer"></div>
        </div>
        <details>
            <summary>Advance Settings</summary>
            <label for="physicalWidth">Grid Width(px):</label>
            <input type="number" id="physicalWidth" value="10" min="1" step="1">
            <label for="offsetX">X Offset(px):</label>
            <input type="number" id="offsetX" value="0" step="1">
            <label for="offsetY">Y Offset(px):</label>
            <input type="number" id="offsetY" value="0" step="1">
            <button onclick="window.drawGrid?.()">Draw Grid</button>
            <button onclick="window.clearGrid?.()">Clear Canvas</button>
            <br>
            <div class="direction-buttons">
                <button onclick="window.setDirection?.('x+', 'y+')">X+ Y+</button>
                <button onclick="window.setDirection?.('x+', 'y-')">X+ Y-</button>
                <button onclick="window.setDirection?.('x-', 'y+')">X- Y+</button>
                <button onclick="window.setDirection?.('x-', 'y-')">X- Y-</button>
            </div>
        </details>
    </div>
</body>

</html>
